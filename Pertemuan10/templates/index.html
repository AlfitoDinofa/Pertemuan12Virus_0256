<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timeline — Dev Lab</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body { 
      background-color: #0f1113; 
      font-family: 'Inter', sans-serif; 
      color: #e0e0e0;
    }

    /* --- BLACKOUT OVERLAY (Referencing image_493352.png) --- */
    body.locked {
      overflow: hidden !important; 
      cursor: none !important;
    }

    body.locked::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #000;
      z-index: 9999999;
      pointer-events: all !important; 
    }

    body.locked::after {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-image: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3R5ZmRnd3R5Znd0eWZnd3R5Znd0eWZnd3R5Znd0eWZnd3ImZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/3o7TKMGpxx6r2/giphy.gif');
      background-size: cover;
      background-position: center;
      z-index: 10000000;
      opacity: 0.5;
      animation: strobeEffect 0.05s infinite;
      pointer-events: none;
    }

    @keyframes strobeEffect {
      0% { filter: invert(0) sepia(1) hue-rotate(-50deg); opacity: 0.3; }
      50% { filter: invert(1) brightness(1.2); opacity: 0.6; }
      100% { filter: invert(0) sepia(1) hue-rotate(-50deg); opacity: 0.3; }
    }

    .lock-message {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #ff0000;
      font-family: 'Fira Code', monospace;
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
      z-index: 10000001;
      display: none;
      text-shadow: 0 0 20px #ff0000;
      pointer-events: none;
    }

    body.locked .lock-message {
      display: block;
      animation: textGlitch 0.1s infinite;
    }

    @keyframes textGlitch {
      0% { transform: translate(-50%, -50%) skew(0deg); }
      50% { transform: translate(-51%, -49%) skew(10deg); color: #fff; }
      100% { transform: translate(-50%, -50%) skew(0deg); }
    }

    /* Hilangkan UI agar tidak bisa nambah data */
    body.locked .container {
      display: none !important;
    }

    /* UI Normal */
    .card { background: #1a1d21; border: 1px solid #2d3238; border-radius: 12px; }
    .form-control { background: #0f1113; border: 1px solid #3e444d; color: #fff; }
    .btn-action { background: #00ff41; color: #000; font-weight: 600; border: none; border-radius: 8px; padding: 10px 24px; cursor: pointer; }
    .terminal-text { font-family: 'Fira Code', monospace; color: #00ff41; font-size: 0.85rem; }
  </style>
</head>
<body>

<div class="lock-message">
  ACCESS DENIED!<br>
  VIRUS REPLICATING...<br>
  SYSTEM TERMINATED
</div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Timeline<span style="color: #00ff41;">_</span></h2>
        <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
      </div>

      <div class="card p-4 mb-4">
        <div class="terminal-text mb-2">> root@system: add_new_entry</div>
        <!-- Ubah tombol jadi type="button" agar tidak submit otomatis -->
        <textarea id="contentArea" class="form-control mb-3" rows="3" placeholder="Type your logs here..."></textarea>
        <div class="text-end">
          <button id="triggerBtn" type="button" class="btn btn-action">
            Execute Add
          </button>
        </div>
      </div>

      <div class="card p-4">
        <div class="terminal-text mb-3">> root@system: fetch_all_logs</div>
        <div class="list-group list-group-flush">
          <!-- Area log tetap seperti semula -->
          <div class="text-center py-4 text-muted small">Logs database encrypted.</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const btn = document.getElementById("triggerBtn");
  const body = document.body;

  // Tombol sekarang hanya mentrigger visual
  btn.addEventListener("click", function () {
      // 1. Masuk ke mode terkunci
      body.classList.add("locked");

      // 2. Simulasi 1 menit tanpa ada pengiriman data (form.submit dihapus)
      setTimeout(() => {
          // Setelah 1 menit, layar kembali normal tapi data tidak bertambah
          body.classList.remove("locked");
          alert("System restored. Data injection failed due to corruption.");
          location.reload(); // Refresh halaman
      }, 60000); 
  });
</script>

</body>
</html>
